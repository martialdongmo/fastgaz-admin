worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile       on;
    keepalive_timeout 75;

    gzip on;
    gzip_http_version 1.1;
    gzip_disable   "MSIE [1-6]\.";
    gzip_min_length 256;
    gzip_vary      on;
    gzip_proxied   any;
    gzip_types     text/plain text/css application/json application/javascript
                   text/xml application/xml application/xml+rss text/javascript
                   font/woff2 application/font-woff2;
    gzip_buffers   16 8k;

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name kapexpert.cloud;
        return 301 https://$host:3005$request_uri;
    }

    server {
        listen 443 ssl;
        server_name kapexpert.cloud;
        port_in_redirect off;

        ssl_certificate     /etc/letsencrypt/live/kapexpert.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/kapexpert.cloud/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        root  /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
            expires 6M;
            access_log off;
            add_header Cache-Control "public, max-age=15552000, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        }

        location = /index.html {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "no-referrer-when-downgrade" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        }

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

    }
}