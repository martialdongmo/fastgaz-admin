<form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="d-flex flex-column gap-3">
  
  <div class="form-floating mb-3">
    <input 
      type="email" 
      class="form-control" 
      id="email" 
      formControlName="email"
      [class.is-invalid]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
    <label for="email">Email address</label>
  </div>

  <div class="form-floating mb-3">
    <input 
      type="password" 
      class="form-control" 
      id="password" 
      formControlName="password"
      [class.is-invalid]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
    <label for="password">Password</label>
  </div>

  <button type="submit" class="btn w-100 py-2" [disabled]="loading() || loginForm.invalid">
    @if (loading()) {
      <span class="spinner-border spinner-border-sm me-2"></span> Authenticating...
    } @else {
      SIGN IN
    }
  </button>
  
  @if (errorMessage()) {
    <div class="alert alert-danger mt-2 small">{{ errorMessage() }}</div>
  }
</form>
